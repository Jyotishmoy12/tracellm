name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "packages/shared/**"
      - "infra/production/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy TraceLLM backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
      DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/root/tracellm/tracellm' }}

    steps:
      - name: Validate required secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "${{ secrets.VPS_SSH_KEY }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/tracellm_deploy_key
          chmod 600 ~/.ssh/tracellm_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on VPS
        run: |
          ssh -i ~/.ssh/tracellm_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          echo "Pulling latest code..."
          git fetch origin main
          git pull --ff-only origin main

          echo "Backing up SQLite database..."
          mkdir -p backups
          docker run --rm \
            -v tracellm-production_tracellm-data:/data \
            -v "$PWD/backups:/backup" \
            alpine sh -c 'if [ -f /data/tracellm.sqlite ]; then cp /data/tracellm.sqlite /backup/tracellm-$(date +%Y%m%d-%H%M%S).sqlite; fi'

          echo "Rebuilding backend image..."
          docker compose -f infra/production/docker-compose.yml build tracellm-server

          echo "Restarting backend container..."
          docker compose -f infra/production/docker-compose.yml up -d --force-recreate tracellm-server

          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4319/health >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 2
          done

          echo "Backend health check failed. Recent logs:"
          docker compose -f infra/production/docker-compose.yml logs --tail=120 tracellm-server
          exit 1
          REMOTE

      - name: Verify public API
        run: |
          curl -fsS https://api.tracellm.in/health
