services:
  tracellm-server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    container_name: tracellm-server
    environment:
      TRACELLM_PORT: 4319
      TRACELLM_DB_PATH: /app/data/tracellm.sqlite
      TRACELLM_OTEL_ENABLED: "true"
      TRACELLM_OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      TRACELLM_OTEL_EXPORTER_OTLP_HEADERS: ""
      TRACELLM_SERVICE_NAME: tracellm-server
      TRACELLM_CAPTURE_CONTENT: "false"
    volumes:
      - tracellm-data:/app/data
    ports:
      - "4319:4319"

volumes:
  tracellm-data:
